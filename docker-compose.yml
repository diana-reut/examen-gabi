services:
  postgres:
    image: postgres:16
    container_name: teoria-transpiratiei-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: teoria_transpiratiei
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: teoria-transpiratiei-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  postgres-data:
  mongo-data:
